name: Deploy to Azure Container Apps

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v3
        with:
          creds: '{"clientId":"${{ secrets.AZURE_CLIENT_ID }}","clientSecret":"${{ secrets.AZURE_CLIENT_SECRET }}","subscriptionId":"${{ secrets.AZURE_SUBSCRIPTION_ID }}","tenantId":"${{ secrets.AZURE_TENANT_ID }}"}'

      - name: Build and deploy Container App
        uses: azure/container-apps-deploy-action@v1
        with:
          appSourcePath: ${{ github.workspace }}/nextjs-app
          dockerfilePath: Dockerfile
          acrName: stcprodacr2026
          acrUsername: ${{ secrets.AZURE_CLIENT_ID }}
          acrPassword: ${{ secrets.AZURE_CLIENT_SECRET }}
          containerAppName: stc-webapp
          containerAppEnvironment: stc-env
          resourceGroup: stc-production
          targetPort: 3000
          ingress: external

      - name: Run database seed
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          ADMIN_NAME: ${{ secrets.ADMIN_NAME }}
        working-directory: nextjs-app
        run: |
          npm ci
          ./node_modules/.bin/prisma generate
          ./node_modules/.bin/prisma db push
          node prisma/seed.js

      - name: Configure Container App environment
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NEXTAUTH_URL: ${{ secrets.NEXTAUTH_URL }}
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
          AZURE_COMMUNICATION_CONNECTION_STRING: ${{ secrets.AZURE_COMMUNICATION_CONNECTION_STRING }}
          AZURE_EMAIL_SENDER: ${{ secrets.AZURE_EMAIL_SENDER }}
          CONTACT_NOTIFICATION_EMAIL: ${{ secrets.CONTACT_NOTIFICATION_EMAIL }}
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
          ADMIN_NAME: ${{ secrets.ADMIN_NAME }}
        run: |
          az containerapp update \
            --name stc-webapp \
            --resource-group stc-production \
            --replace-env-vars \
            "DATABASE_URL=$DATABASE_URL" \
            "NEXTAUTH_URL=$NEXTAUTH_URL" \
            "NEXTAUTH_SECRET=$NEXTAUTH_SECRET" \
            "AZURE_COMMUNICATION_CONNECTION_STRING=$AZURE_COMMUNICATION_CONNECTION_STRING" \
            "AZURE_EMAIL_SENDER=$AZURE_EMAIL_SENDER" \
            "CONTACT_NOTIFICATION_EMAIL=$CONTACT_NOTIFICATION_EMAIL" \
            "ADMIN_EMAIL=$ADMIN_EMAIL" \
            "ADMIN_NAME=$ADMIN_NAME"