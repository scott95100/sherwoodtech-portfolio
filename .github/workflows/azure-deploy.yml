name: Deploy to Azure Container Apps

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify platform page source
        working-directory: nextjs-app
        run: |
          echo "Deploying commit $(git rev-parse HEAD)"
          grep -n "Apply for Beta Access\|focused beta\|Join the Waitlist\|Built for client-facing work" src/app/platform/page.tsx || true

      - name: Log in to Azure
        uses: azure/login@v3
        with:
          creds: '{"clientId":"${{ secrets.AZURE_CLIENT_ID }}","clientSecret":"${{ secrets.AZURE_CLIENT_SECRET }}","subscriptionId":"${{ secrets.AZURE_SUBSCRIPTION_ID }}","tenantId":"${{ secrets.AZURE_TENANT_ID }}"}'

      - name: Build and deploy Container App
        uses: azure/container-apps-deploy-action@v1
        with:
          appSourcePath: ${{ github.workspace }}/nextjs-app
          dockerfilePath: Dockerfile
          imageToBuild: stcprodacr2026.azurecr.io/stc-webapp:${{ github.sha }}
          acrName: stcprodacr2026
          acrUsername: ${{ secrets.AZURE_CLIENT_ID }}
          acrPassword: ${{ secrets.AZURE_CLIENT_SECRET }}
          containerAppName: stc-webapp
          containerAppEnvironment: stc-env
          resourceGroup: stc-production
          targetPort: 3000
          ingress: external
          buildArguments: |
            "GIT_SHA=${{ github.sha }}"

      - name: Run database seed
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          ADMIN_NAME: ${{ secrets.ADMIN_NAME }}
        working-directory: nextjs-app
        run: |
          npm ci
          ./node_modules/.bin/prisma generate
          ./node_modules/.bin/prisma db push
          node prisma/seed.js

      - name: Configure Container App environment
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NEXTAUTH_URL: ${{ secrets.NEXTAUTH_URL }}
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
          AZURE_COMMUNICATION_CONNECTION_STRING: ${{ secrets.AZURE_COMMUNICATION_CONNECTION_STRING }}
          AZURE_EMAIL_SENDER: ${{ secrets.AZURE_EMAIL_SENDER }}
          CONTACT_NOTIFICATION_EMAIL: ${{ secrets.CONTACT_NOTIFICATION_EMAIL }}
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
          ADMIN_NAME: ${{ secrets.ADMIN_NAME }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
        run: |
          az containerapp update \
            --name stc-webapp \
            --resource-group stc-production \
            --replace-env-vars \
            "DATABASE_URL=$DATABASE_URL" \
            "NEXTAUTH_URL=$NEXTAUTH_URL" \
            "NEXTAUTH_SECRET=$NEXTAUTH_SECRET" \
            "AZURE_COMMUNICATION_CONNECTION_STRING=$AZURE_COMMUNICATION_CONNECTION_STRING" \
            "AZURE_EMAIL_SENDER=$AZURE_EMAIL_SENDER" \
            "CONTACT_NOTIFICATION_EMAIL=$CONTACT_NOTIFICATION_EMAIL" \
            "ADMIN_EMAIL=$ADMIN_EMAIL" \
            "ADMIN_NAME=$ADMIN_NAME" \
            "ADMIN_PASSWORD=$ADMIN_PASSWORD"

      - name: Verify new revision is ready
        run: |
          echo "Waiting for latest revision to become ready..."
          for i in $(seq 1 20); do
            LATEST=$(az containerapp revision list \
              --name stc-webapp \
              --resource-group stc-production \
              --query "reverse(sort_by(@, &properties.createdTime))[0]" \
              --output json)
            READY=$(echo "$LATEST" | jq -r '.properties.healthState')
            REVISION=$(echo "$LATEST" | jq -r '.name')
            echo "Revision $REVISION health: $READY"
            if [ "$READY" = "Healthy" ]; then
              echo "✅ Revision $REVISION is ready."
              exit 0
            fi
            sleep 15
          done
          echo "❌ New revision did not become healthy within 5 minutes."
          az containerapp logs show \
            --name stc-webapp \
            --resource-group stc-production \
            --revision "$REVISION" \
            --tail 100 || true
          exit 1