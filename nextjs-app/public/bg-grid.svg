<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <g stroke="#243044" stroke-width="1" stroke-opacity="0.06" fill="none">
    
    <!-- vertical grid -->
    <line x1="0" y1="0" x2="0" y2="120"/>
    <line x1="40" y1="0" x2="40" y2="120"/>
    <line x1="80" y1="0" x2="80" y2="120"/>
    <line x1="120" y1="0" x2="120" y2="120"/>

    <!-- horizontal grid -->
    <line x1="0" y1="0" x2="120" y2="0"/>
    <line x1="0" y1="40" x2="120" y2="40"/>
    <line x1="0" y1="80" x2="120" y2="80"/>
    <line x1="0" y1="120" x2="120" y2="120"/>

    <!-- isometric diagonals -->
    <line x1="0" y1="40" x2="40" y2="0"/>
    <line x1="40" y1="80" x2="80" y2="40"/>
    <line x1="80" y1="120" x2="120" y2="80"/>

    <line x1="40" y1="120" x2="120" y2="40"/>
    <line x1="0" y1="80" x2="80" y2="0"/>

  </g>
</svg>
